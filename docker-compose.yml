services:
  backend:
    build: ./backend
    container_name: inflx-backend
    volumes:                # ✅ FIXED
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./autostream-ui
    container_name: inflx-frontend
    volumes:
      - ./autostream-ui:/app
      - /app/node_modules   # ✅ CRITICAL FIX
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always